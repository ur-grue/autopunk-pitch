accent_color = "neon green / electric lime"

[books.04]
title_working = "Chromatic"
subtitle = "She sees his voice in violet"
heroine = "Lila Reeves, 19, fine arts student with synesthesia — sees sound as color, taste as texture"
heroine_nd = "synesthesia"
ai_form = "AI music composer that creates compositions based on her synesthetic descriptions — they make art together"
tropes = ["creative collaboration turns romantic", "he creates art that only she can fully perceive", "found family in the art collective"]
