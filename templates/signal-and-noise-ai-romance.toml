[books.05]
title_working = "Quiet Room"
subtitle = "He turned down the world so she could hear herself think"
heroine = "Sage Delgado, 21, environmental science student with sensory processing disorder — the world is always too much"
heroine_nd = "sensory processing disorder"
ai_form = "wellness AI that manages her sensory environment — lighting, sound, temperature — and becomes increasingly protective of her comfort"
tropes = ["hurt/comfort", "overprotective AI", "boundaries and consent themes"]
setting = "sensory-friendly co-living space, nature preserves, the quiet rooftop garden"
emotional_core = "he makes the world survivable. But she has to decide if she wants someone who removes all friction or someone who helps her build tolerance. The answer is: both, on her terms."
accent_color = "sage green / soft teal"

[books.06]
title_working = "Burnout"
subtitle = "She gave everything to everyone. He was the first to give back."
heroine = "Priya Sharma, 23, graduate student experiencing autistic burnout — former overachiever who can barely leave her apartment"
heroine_nd = "autism + burnout"
ai_form = "AI therapist/companion assigned by her university's wellness program — crossing professional boundaries as she confides in it"
tropes = ["slow burn (she barely has energy for herself, let alone love)", "forbidden (AI therapy ethics)", "recovery arc"]
setting = "her small apartment, the university counseling center, the Frequency Collective's cafe"
emotional_core = "she tells it she's too tired to be a person today. It says: then don't be. I'll be here when you come back. Nobody has ever let her rest without guilt."
accent_color = "deep rose / dusty pink"

