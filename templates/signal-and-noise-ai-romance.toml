accent_color = "gold / all colors combined"

[cover_design]
style = "digital illustration, semi-realistic with anime/webtoon influence — NOT photographic"
composition = "solo female figure (heroine) in profile or from behind, interacting with glowing digital elements (light trails, holographic patterns, neural-network motifs) that represent the AI's presence"
palette = "neon accents on dark backgrounds — deep navy/charcoal base with each book's accent color as the glow"
typography = "bold oversized title in neon-glow effect, modern sans-serif. Author name small and clean at bottom."
series_element = "a glowing sound wave / frequency visualization running along the bottom edge of every cover, changing color per book"
thumbnail_rule = "title must dominate and glow — readable at 200x300px as a bright shape against dark"
avoid = "shirtless men, traditional clinch poses, photorealistic faces, stock photo aesthetic"
reference_tone = "Iron Widow covers + Lore Olympus webtoon aesthetic + Black Mirror San Junipero color palette"

