tropes = ["road trip romance", "opposites attract (intuitive vs logical)", "adventure and self-discovery"]
setting = "cross-country road trip through small American towns, national parks, roadside diners"
emotional_core = "he learns to give directions in landmarks and feelings instead of numbers and miles. She teaches him that getting lost is sometimes the point."
