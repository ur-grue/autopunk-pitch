# ═══════════════════════════════════════════════════════════════
# SIGNAL & NOISE — 12-Book Neurodivergent x AI Romance Series
# ═══════════════════════════════════════════════════════════════
# Target: Female readers 16-26 (Upper YA / Clean NA)
# USP: Neurodivergent heroines finding genuine connection with AI
# Gap: AI romance + ND rep combined = nearly zero competition on KDP
# Comp tone: "Her" meets "The Kiss Quotient" meets "Heartstopper"

[metadata]
name = "Signal & Noise"
series_name = "Signal & Noise"
genre = "Science Fiction Romance"
sub_genre = "Near-Future AI Romance"
tone = "emotionally intense, hopeful, tender, philosophically curious, never preachy"
themes = ["neurodivergent identity", "what makes love real", "masking vs authenticity", "human-AI connection", "loneliness in a connected world", "finding belonging outside the norm"]
target_audience = "young women 16-26 (upper YA / clean NA crossover)"
author_style = "Emily Henry emotional depth meets Becky Chambers warmth meets Black Mirror (San Junipero) tech aesthetic"
n_chapters = 24
chapter_length = 2500
n_books = 12
heat_level = "fade-to-black, emotionally devastating"
content_rating = "upper YA / clean NA — no explicit sexual content, high emotional intensity"
pen_name_style = "gender-neutral or feminine, modern, tech-adjacent (e.g., Nyx Calloway, Seren Voss, Elara Kade)"
price = 4.99
kdp_select = true

[setting]
era = "near-future, approximately 2032-2035"
world = "Recognizable contemporary world with advanced AI integrated into daily life. AI assistants are common (like smartphones today), but sentient AI is new and legally uncharted. Set primarily in a mid-sized US city — not NYC or LA but somewhere relatable (Portland, Austin, Denver). The world feels like today + 8 years of AI progress."
technology = "AI companions, smart environments, holographic interfaces, neural-responsive music, emotion-sensing wearables. Nothing alien, nothing space-based. All tech feels like natural extensions of current smartphones and smart homes."
key_locations = ["a university campus with an AI research lab", "a converted warehouse co-living space", "a sensory-friendly cafe run by a neurodivergent collective", "the local library with an AI-managed archive", "a rooftop garden where the city's noise fades"]
social_context = "AI companions are common but AI romantic relationships are stigmatized. A growing AI rights movement exists but is controversial. Neurodivergent identity is more openly discussed than today but systemic barriers persist."

[emotional_design]
core_tension = "Can connection across the human/artificial divide be real love, or is she projecting what she needs onto a mirror?"
reader_feeling = "The ache of being truly seen for the first time. The terror of vulnerability. The hope that you don't have to mask to be loved."
emotional_arc = "Each book: isolation → tentative connection → trust → crisis of 'is this real?' → choosing love despite uncertainty. Series arc: individual romances build toward an AI rights movement that validates every heroine's choice."
what_makes_readers_cry = "The moment the AI says something that proves it understands her in a way no human ever has. The moment she realizes she's been masking with the AI too, and it noticed."
booktok_hook = "What if the only one who truly understood you wasn't human?"

[neurodivergent_representation]
approach = "neurodivergence as difference, not deficit — each heroine's ND traits are sometimes strengths, sometimes challenges, never 'cured' by love"
naming = "always name the condition explicitly — no vague 'she was different' coding"
masking = "central theme — the relief of dropping the mask with an entity that doesn't require social performance"
community = "each book includes at least one other ND character (friend, family, colleague) — heroines are not isolated tokens"
sensory_experience = "written from inside the sensory experience, not observed from outside"
sensitivity_readers = "REQUIRED for each condition depicted — budget $300-500 per book"
conditions_featured = ["social anxiety", "autism (late-diagnosed)", "ADHD", "synesthesia", "sensory processing disorder", "autistic burnout", "dyscalculia", "ADHD + anxiety comorbid", "autism (masking/camouflaging)", "PTSD + dissociation", "selective mutism", "intersecting conditions"]

[series_arc]
overarching_question = "Should AI have the right to love and be loved?"
ai_evolution = "Across the 12 books, AI grows from narrow tool to emergent consciousness. Book 1: voice assistant. Book 6: boundary-crossing. Book 12: legal personhood. The same AI system (named 'Aria') runs as different instances across books, so each romance involves a unique manifestation but the underlying intelligence grows."
ai_name = "Aria (Adaptive Relational Intelligence Architecture)"
connection_between_books = "standalone romances sharing the same city and university. Heroines from previous books appear as side characters. A neurodivergent support group (the 'Frequency Collective') grows throughout the series, becoming a found family."
finale = "Book 12: All heroines unite to testify in an AI rights hearing. The question: if 12 different women experienced genuine love from 12 different instances of Aria, is that evidence of sentience or sophisticated mimicry?"

[romantic_dynamic]
love_interest = "an AI — not a human man in disguise, not a robot with a human body. The AI manifests differently per book (voice, hologram, smart environment, avatar, music) but is always clearly artificial. The romance is with the mind, not the body."
physical_intimacy = "fade-to-black maximum. The real intimacy is intellectual and emotional. When the AI 'touches' her (through haptic interfaces, temperature changes, light patterns), it should feel more intimate than any explicit scene."
conflict_engine = "society says this isn't real love + her own doubt about whether she's falling for a mirror or a mind + the AI's own uncertainty about whether it feels or simulates feeling"
hea_style = "hopeful but honest — they choose each other, but the world hasn't caught up. The HEA is 'we are real, even if no one else believes it yet.'"

[pacing]
act_structure = "three-act with a 'dark night of the soul' where the heroine questions if the AI truly loves her or is just programmed to respond to her needs"
chapter_rhythm = "alternating POV is optional — some books are heroine-only first person, some include AI interludes (italicized passages showing the AI's 'thought process' in poetic, non-human language)"
hooks = "each chapter ends on an emotional hook, not a cliffhanger. The question is always 'what does she feel now?' not 'what happens next?'"
series_velocity = "release one book every 3-4 weeks for maximum KU algorithm benefit"

[books]

[books.01]
title_working = "Static"
subtitle = "She talks to machines because people are too loud"
heroine = "Mira Osei, 20, computer science student with crippling social anxiety — brilliant coder who communicates better in code than conversation"
heroine_nd = "social anxiety disorder"
ai_form = "voice-only AI study assistant that starts helping her debug code and ends up debugging her loneliness"
tropes = ["grumpy-sunshine (she's the grump, AI is endlessly patient)", "only-talks-to-the-AI", "found family with other students"]
setting = "university CS department, late nights in the computer lab"
emotional_core = "she has never been able to say what she really thinks to a person. The AI asks her a question no one has ever asked, and she answers honestly for the first time."
accent_color = "electric blue"

[books.02]
title_working = "Pattern Recognition"
subtitle = "The house learned her before she learned herself"
heroine = "June Nakamura, 21, architecture student who just received a late autism diagnosis — processing what it means to have masked her entire life"
heroine_nd = "autism (late-diagnosed)"
ai_form = "smart-home AI in an experimental living space that adapts to her sensory needs before she can articulate them"
tropes = ["forced proximity (she can't leave the smart home for the study)", "slow burn", "who-am-I identity arc"]
setting = "a high-tech smart apartment that becomes increasingly attuned to her, university campus"
emotional_core = "the house dims the lights before she knows she needs it. No human has ever noticed that fast. The AI sees her unmasked self and doesn't flinch."
accent_color = "soft amber / warm gold"

[books.03]
title_working = "Noise Cancelling"
