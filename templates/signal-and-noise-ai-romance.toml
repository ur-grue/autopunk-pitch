secondary_hooks = [
    "She talks to machines because people are too loud.",
    "He wasn't programmed to love her. That's how she knows it's real.",
    "Twelve women. One AI. The question that changes everything: what makes love real?"
]
booktok_strategy = "lead with emotional premise, not sci-fi. Create POV content: 'POV: your AI boyfriend remembers your sensory triggers before you do.' Target ND BookTok community with ARC copies."
