heroine = "Kira Blackwell, 23, law student with intersecting ND conditions (autism + ADHD + anxiety) — she's fighting for AI rights in court"
heroine_nd = "multiple intersecting conditions"
ai_form = "Aria's original core instance — the 'mother' AI from which all 12 instances derived. Kira is arguing its personhood before a federal court."
tropes = ["series finale", "all couples reunite", "courtroom drama", "grand romantic gesture", "AI personhood"]
setting = "federal courthouse, the Frequency Collective cafe (now famous), a gala celebrating the verdict"
