]

[required_reader_effect]
psychological_outcomes = [
    "visceral, consuming attachment to the obsessive hero",
    "elevated heart rate during pursuit and intimate scenes",
    "emotional devastation at the soft moments within the darkness",
    "cathartic satisfaction at the HEA",
