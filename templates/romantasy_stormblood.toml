]

[required_reader_effect]
psychological_outcomes = [
    "obsessive attachment to the bully-to-lover hero",
    "deep investment in the friend group as a found family",
    "competitive thrill during trial and Crucible scenes",
    "emotional devastation at betrayal moments, catharsis at reconciliation",
    "desperate need to see the heroine reach her full power",
    "creation of BookTok edits, playlists, and fan content for the series"
]
