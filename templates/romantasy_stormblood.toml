booktok_alignment = [
    "the bully's first crack -- the moment readers see he is falling apart over her",
    "the Crucible fight where they are forced to partner and are devastatingly good together",
    "the 'he anonymously helped her' reveal -- gasps and reread moments",
    "friend group banter scenes -- quotable, warm, shareable",
    "the first kiss scene -- angry, charged, in a forbidden location",
    "power awakening moments -- her storm magic manifesting in spectacular fashion",
    "aesthetic set-pieces: the floating academy in storm light, the obsidian library, the caldera glowing beneath"
]
kindle_unlimited_optimization = [
    "25 chapters at ~3600 words = 90,000 words, 405+ KENP pages -- maximizes page-read revenue",
    "open with the arrival at the academy -- immediate immersion, no slow preamble",
    "the ranking system provides built-in progress tracking that sustains engagement",
