[metadata]
name = "Contemporary Romance"
description = "Book 6 of The Blackwell Interns — an events intern and the charming Events Director. Second chance romance with a one-night stand twist. Steamiest book in the series."
tone = "charged, playful, emotionally raw"
themes = ["past mistakes", "second chances", "professionalism vs. desire", "vulnerability after casual intimacy"]
n_chapters = 20
chapter_length = 2500
target_audience = "women 18-30, BookTok romance readers"
author_style = "Avery Sinclair"
tropes = ["second chance", "workplace romance", "forbidden (boss-intern)", "secret history"]

[meta]
purpose = "Instruction specification for Book 6 of 'The Blackwell Interns' series by Avery Sinclair. A commercially optimized contemporary workplace romance novel featuring a young female events intern and the charming but emotionally guarded Events Director at a prestigious NYC fashion media empire. Medium-high spice (the steamiest book in the series so far). Second chance romance with a one-night stand twist. HEA guaranteed."
planning_allowed = false
plot_generation_allowed = false
character_generation_allowed = false
title_generation_allowed = false
focus = "Define emotional, structural, sensual, and psychological characteristics required for maximum reader obsession, binge-read behavior, and conversion on Amazon KDP, Kindle Unlimited, and BookTok."

[series]
name = "The Blackwell Interns"
author = "Avery Sinclair"
book_number = 6
total_books = 7
book_title = "Event Horizon"
company = "Blackwell Media Group — a prestigious NYC fashion and media conglomerate housed in a glass tower in Midtown Manhattan"
shared_locations = ["Blackwell Tower (glass skyscraper, Midtown Manhattan)", "The Thirty-Six (rooftop bar, 36th floor)", "The marble-and-glass lobby", "Central Park (lunch breaks, emotional conversations)"]
recurring_character = "Marcus Blackwell — founder/CEO, 60s, mentor figure, brief appearance"
timeline = "One summer internship, June through August"
intern_cohort = "Seven female interns across seven departments who know each other, have a group chat, and support each other throughout the summer"

[book_specific]
department = "Events"
heroine_role = "Events intern — organized, high-energy, hides vulnerability behind competence, the 'always has it together' friend who is actually falling apart inside after her parents' divorce"
hero_role = "Events Director — smooth, confident publicly, haunted by a failed engagement (his ex left him at the altar), uses charm as armor"
primary_trope = "second chance — they had a one-night stand the night before she started the internship"
secondary_tropes = ["workplace romance", "forbidden (boss-intern)", "secret history"]
central_conflict = "She walks into orientation and sees her one-night stand is her boss. They agree to pretend it never happened. But they are forced to work together on every event. The chemistry is undeniable. They keep 'accidentally' ending up alone together. She starts falling but he is terrified of being left again after his ex abandoned him at the altar."
spice_beats = "Their shared history adds heat from page one — they have already been intimate. Three steamy scenes around chapters 8, 15, and 19. Medium-high spice — the steamiest book in the series so far. Sensual, vivid, and emotionally charged with explicit physical detail grounded in emotional vulnerability."
cameos = "All five previous couples appear in meaningful scenes. The intern cohort is tight — multiple scenes of friendship, group dinners, and honest conversations. The editorial intern, styling intern, social media intern, PR intern, and photography intern all have established relationships by now. Reference the Blackwell Gala preparations as setup for Book 7."
previous_books_context = "Books 1-5 couples are established and happy. The intern friend group has deepened over the summer. The Blackwell Gala (the company's biggest annual event) is being planned — this is the heroine's biggest professional challenge and the series-wide culmination event in Book 7."
epilogue_setup = "Epilogue hints at Book 7 couple (executive intern + CFO) and teases the Blackwell Gala as the series finale event"

