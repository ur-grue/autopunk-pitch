    "strategically brilliant — reads people and situations instantly",
    "carrying guilt from a past professional failure that cost someone their career",
    "protective of the Blackwell brand but increasingly protective of her",
    "charm masks genuine vulnerability and fear of repeating past mistakes",
    "demonstrates emotional vulnerability only after prolonged tension and trust-building"
]
attraction_model = [
