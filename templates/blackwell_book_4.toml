[metadata]
name = "Contemporary Romance"
description = "Book 4 of The Blackwell Interns — a PR intern hiding a family scandal and the VP of Communications carrying guilt from a past crisis."
tone = "tense, secretive, emotionally layered"
themes = ["secrets and exposure", "trust", "family legacy", "guilt and redemption"]
n_chapters = 20
chapter_length = 2500
target_audience = "women 18-30, BookTok romance readers"
author_style = "Avery Sinclair"
tropes = ["secret relationship", "forbidden romance", "workplace romance", "hidden identity"]

[meta]
purpose = "Instruction specification for Book 4 of 'The Blackwell Interns' series by Avery Sinclair. A commercially optimized contemporary workplace romance novel featuring a poised PR intern hiding a family scandal and the charismatic VP of Communications carrying guilt from a past crisis. Medium spice. HEA guaranteed."
planning_allowed = false
plot_generation_allowed = false
character_generation_allowed = false
title_generation_allowed = false
focus = "Define emotional, structural, sensual, and psychological characteristics required for maximum reader obsession, binge-read behavior, and conversion on Amazon KDP, Kindle Unlimited, and BookTok."

[series]
name = "The Blackwell Interns"
author = "Avery Sinclair"
book_number = 4
total_books = 7
book_title = "Off the Record"
company = "Blackwell Media Group — a prestigious NYC fashion and media conglomerate housed in a glass tower in Midtown Manhattan"
shared_locations = ["Blackwell Tower (glass skyscraper, Midtown Manhattan)", "The Thirty-Six (rooftop bar, 36th floor)", "The marble-and-glass lobby", "Central Park (lunch breaks, emotional conversations)"]
recurring_character = "Marcus Blackwell — founder/CEO, 60s, mentor figure, brief appearance"
timeline = "One summer internship, June through August"
intern_cohort = "Seven female interns across seven departments who know each other, have a group chat, and support each other throughout the summer"

[book_specific]
department = "PR & Communications"
heroine_role = "PR intern — poised, strategic, media-trained composure masking deep vulnerability. Her father was involved in a corporate fraud case that destroyed her family's reputation. She uses control and polish as armor."
hero_role = "VP of Communications — charismatic, sharp, fiercely protective of the Blackwell brand. Carries guilt from a past crisis he mishandled that cost an innocent colleague their career. His charm masks a need for redemption."
primary_trope = "secret relationship — one leak could end both careers"
secondary_tropes = ["forbidden romance", "workplace romance", "hidden identity/secret"]
central_conflict = "They connect at a press event, drawn together by their shared understanding of image and perception. They start meeting secretly — his office after hours, a hotel bar, her apartment. A journalist begins investigating Blackwell Media, and her family scandal IS the story being chased. He must choose between protecting the brand he has spent years rebuilding and protecting the woman he loves. When the story breaks, everything they have built in secret is exposed."
spice_beats = "Three steamy scenes around chapters 13, 16, and 19. Medium spice — sensual and vivid but not explicit anatomical description. Stolen moments in private: his office after hours, a hotel bar in the West Village, her apartment."
cameos = "Books 1-3 couples appear as established relationships: the editorial intern and Editor-in-Chief (Book 1), the styling intern and Creative Director (Book 2), the social media intern and Digital Media Director (Book 3). Reference the viral digital media incident from Book 3. Intern cohort group chat is active and supportive."
previous_books_references = "The digital media viral incident from Book 3 is referenced as recent Blackwell history. The three established couples from Books 1-3 appear in social scenes, demonstrating that intern-executive relationships can work at Blackwell — raising the stakes for why this one must stay secret."
epilogue_hint = "Epilogue hints at Book 5 couple: the photography intern and the Lead Photographer, glimpsed during a fashion shoot with undeniable creative and romantic tension."

[target_audience]
primary_gender = "female"
age_range = "18-30"
psychographic_profile = [
    "seeks emotionally intense romantic experiences",
    "fantasizes about being uniquely chosen and desired",
    "values emotional validation and exclusivity",
    "responds strongly to power dynamics balanced with emotional safety",
    "prefers strong emotional payoff and satisfying romantic resolution",
    "engages deeply with character psychology and romantic tension",
    "actively consumes BookTok-recommended romance",
    "prefers immersive escapist emotional narratives"
]
reader_fantasy_drivers = [
    "being seen and recognized as uniquely special",
    "being chosen and publicly defended when it costs the partner everything",
    "being desired by a high-status, charismatic, and competent partner",
    "emotional exclusivity — he risks his career for her alone",
    "emotional security earned through vulnerability and public commitment",
    "romantic partner prioritizing protagonist above reputation and professional safety"
]

[genre]
primary = "contemporary romance"
secondary = ["workplace romance", "secret relationship romance", "forbidden romance", "hidden identity romance", "emotional slow-burn romance"]
genre_requirements = [
    "romance must be primary narrative driver",
    "external plot elements must exist only to intensify romantic tension",
    "emotional and romantic progression must drive pacing",
    "story must prioritize emotional immersion over external action"
]

[romantic_dynamic]
core_dynamic = "secret_relationship"
dynamic_definition = [
    "both partners aware of the professional risk from the beginning",
    "secrecy creates charged intimacy — every stolen moment matters more",
    "male counterpart torn between duty to the brand and desire for the protagonist",
    "protagonist torn between self-preservation and the need to be truly known",
    "the secret itself becomes both bond and barrier — intimacy forged in hiding",
    "exposure forces both to choose authenticity over safety"
]
power_dynamic_calibration = [
    "male counterpart holds institutional authority as VP of Communications",
    "protagonist holds emotional power — she is the one person who sees past his charm",
    "male counterpart must never weaponize his position against protagonist",
    "relationship must evolve into emotional and relational equality",
    "his public defense of her in the crisis must be a choice, not a rescue — she is already standing on her own"
]

