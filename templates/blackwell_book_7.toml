[metadata]
name = "Contemporary Romance"
description = "Book 7 (SERIES FINALE) of The Blackwell Interns — the CEO's executive intern and the quiet CFO (Blackwell's son). Slowest burn, biggest payoff. All 7 couples reunite at the Blackwell Gala."
tone = "sweeping, culminating, emotionally devastating"
themes = ["legacy", "being underestimated", "quiet strength", "found family", "series closure"]
n_chapters = 20
chapter_length = 2500
target_audience = "women 18-30, BookTok romance readers"
author_style = "Avery Sinclair"
tropes = ["slow burn", "grumpy-sunshine reversed", "boss's son", "workplace romance", "last to fall"]

[meta]
purpose = "Instruction specification for Book 7 (SERIES FINALE) of 'The Blackwell Interns' series by Avery Sinclair. A commercially optimized contemporary workplace romance novel featuring the CEO's executive intern and the quiet, underestimated CFO (Marcus Blackwell's son) at a prestigious NYC fashion media empire. Slowest burn with the biggest emotional payoff. Medium spice. HEA guaranteed. All 7 couples reunite at the Blackwell Gala for the series-closing climax."
planning_allowed = false
plot_generation_allowed = false
character_generation_allowed = false
title_generation_allowed = false
focus = "Define emotional, structural, sensual, and psychological characteristics required for maximum reader obsession, binge-read behavior, and conversion on Amazon KDP, Kindle Unlimited, and BookTok. As the series finale, this book must deliver satisfying closure for all 7 couples while giving Book 7's couple the most emotionally intense payoff of the entire series."

[series]
