recurring_character = "Marcus Blackwell — founder/CEO, 60s, mentor figure, MAJOR role in Book 7 — announces retirement, passes the torch, delivers the Gala speech that changes everything"
timeline = "One summer internship, June through August"
intern_cohort = "Seven female interns across seven departments who know each other, have a group chat, and support each other throughout the summer — this is the final intern's story, the one who watched all her friends fall in love and told herself she never would"

[book_specific]
department = "Executive / C-Suite"
heroine_role = "CEO's executive intern — the most driven of the cohort, last to fall in love, laser-focused on her career, secretly afraid that wanting love means she's not ambitious enough"
hero_role = "CFO (Marcus Blackwell's son) — quiet, underestimated by everyone, brilliant with numbers but awkward with people, tired of being 'the founder's son,' proves himself through quiet competence"
primary_trope = "the quiet one everyone overlooked + slow burn"
secondary_tropes = ["grumpy-sunshine reversed (she's driven, he's gentle)", "boss's son", "workplace romance", "last to fall in love"]
central_conflict = "She's assigned to shadow the CFO for the summer. She expected someone intimidating — he's the opposite. Gentle, thoughtful, and invisibly holding the company together. She starts to see what everyone else misses. But she's terrified that falling in love will derail the career she's sacrificed everything for. Meanwhile, he's afraid that anyone who gets close only wants access to his father."
spice_beats = "Slowest burn, biggest payoff. Three steamy scenes around chapters 16, 18, and 20. Medium spice with the most emotional intensity of the series — every touch earned through 15 chapters of restraint."
cameos = "ALL 6 previous couples appear significantly throughout. The Blackwell Gala is the setting for the climax — every couple reunites. Marcus Blackwell has his biggest role, announcing retirement and passing the torch. Each previous couple gets a meaningful moment at the Gala."
previous_books = [
    "Book 1 (Corner Office Crush): Editorial intern + Editor-in-Chief — grumpy-sunshine, forbidden workplace romance",
    "Book 2: Styling intern + Creative Director",
    "Book 3: Social media intern + Marketing VP",
    "Book 4: PR intern + Head of Communications",
    "Book 5: Photography intern + Art Director",
    "Book 6: Events intern + Head of Events"
]
