    "compassionate — sees the person behind the monster",
    "resilient — has survived hardship in the human world",
    "curious rather than repulsed — her willingness to look past his appearance is what cracks him open",
    "physically small relative to the hero — the size difference is visually and emotionally emphasized",
    "has agency — she is not a passive victim; she makes choices that drive the plot"
]
reader_identification_requirement = "the reader must feel the heroine's journey from fear to fascination to desire to love — every stage must be viscerally real"

