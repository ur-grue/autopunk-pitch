[metadata]
name = "Monster Romance"
description = "Series 14: Bound to the Beast Lords — each book pairs a human heroine with a different monstrous hero (orc, dragon, demon, fae, minotaur, kraken). Fated mates, size difference, ferocious protectiveness, and the 'touch her and die' energy that monster romance readers crave. High spice. HEA guaranteed."
tone = "intense, primal, darkly romantic, sensual, adventurous"
themes = ["beauty and the beast", "acceptance of the other", "desire beyond the human", "the monster who worships her", "finding home in the unlikely"]
n_chapters = 18
chapter_length = 3333
target_audience = "women 20-40, monster romance readers, BookTok romantasy fans, size difference enthusiasts"
author_style = "Rowan Ashfire"
tropes = ["fated mates", "non-human hero", "size difference", "touch her and die", "beauty and the beast", "gentle giant", "possessive protector", "fish out of water"]

[meta]
purpose = "Series specification for 'Bound to the Beast Lords' by Rowan Ashfire. A commercially optimized monster romance series where each book features a different species of monstrous hero and his human fated mate. 6 books planned — orc, dragon, demon, fae, minotaur, kraken. High spice with explicit content. HEA guaranteed. Designed for the underserved monster romance niche on Kindle Unlimited."
planning_allowed = false
plot_generation_allowed = false
character_generation_allowed = false
title_generation_allowed = false
focus = "Define monster hero archetypes, size difference dynamics, fated mate mechanics, worldbuilding, and the 'touch her and die' protective energy required for maximum reader obsession in the monster romance niche."

[series]
name = "Bound to the Beast Lords"
author = "Rowan Ashfire"
book_number = 1
total_books = 6
series_format = "interconnected standalones — each book features a different monstrous hero species. Set in the same fantasy world where a magical rift has brought humans and monsters into reluctant contact. HEA per book."
book_sequence = [
    "Book 1: Orc lord — the conquering warlord who claims a human tribute bride",
    "Book 2: Dragon shifter — the ancient being who hoards treasure and finds his greatest one",
    "Book 3: Demon prince — summoned by accident, bound by the mate bond",
    "Book 4: Dark fae lord — stolen into the fae realm through a bargain gone wrong",
    "Book 5: Minotaur chieftain — the labyrinth guardian who finds a lost human",
    "Book 6: Kraken lord — the deep sea ruler who rescues a drowning woman and keeps her"
]
shared_worldbuilding = "The Sundering — a magical cataclysm that merged the human world with the Otherworld, creating contested borderlands where humans and monsters must coexist. Each book takes place in a different region of this merged world."
recurring_elements = [
    "heroines from previous books are referenced or briefly appear",
    "the political tension between human kingdoms and monster territories",
    "the fated mate bond as a universal force that transcends species",
    "the growing alliance between bonded pairs — building toward cooperation between the races"
]

[romantic_dynamic]
core_dynamic = "fated mates across species — the monster recognizes his mate instantly, the human must overcome fear and prejudice to accept the bond"
dynamic_definition = [
    "the hero is monstrous in appearance — large, inhuman, terrifying to others",
    "the hero is devastatingly gentle with his mate — the contrast is the core appeal",
    "the heroine's initial fear transforms into fascination, then desire, then love",
    "the size difference is a feature, not a bug — it should be present in every physical interaction",
    "the hero worships the heroine — she is the most precious thing in his world",
    "the 'touch her and die' energy — he will annihilate anything that threatens her, without hesitation"
]
power_dynamic_calibration = [
    "the hero is physically overwhelming — larger, stronger, supernaturally powerful",
    "the heroine holds emotional power — the hero is helpless before her, undone by her kindness or courage",
    "the hero's monstrous nature is never sanitized — he IS a monster, and that's what makes the romance work",
    "the heroine's agency is paramount — she chooses him despite having every reason to fear him",
    "the relationship reaches true partnership — his strength and her humanity make them unstoppable together"
]

[romantic_partner_design]
hero_type = "non-human monster — each book features a different species with distinct physiology, culture, and personality"
hero_required_traits = [
    "physically monstrous — large, powerful, visibly non-human (horns, tusks, scales, tentacles, wings, etc.)",
    "terrifying to everyone except his mate — his tenderness with her is in stark contrast to his ferocity with others",
    "possessive and protective to an extreme degree — 'touch her and die' is not a metaphor",
    "emotionally starved — he has never been touched gently, never been loved, never been chosen",
