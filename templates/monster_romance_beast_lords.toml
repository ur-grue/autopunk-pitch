    "obsessive attention — he cannot look away, cannot leave her, must be near her",
    "confusion — she should be terrified but she isn't, and that confuses both of them",
    "protective escalation — he destroys a threat to her, and her fear becomes awe",
    "tenderness — the moment his massive hand cradles her face like she's made of glass",
    "surrender — she touches him first, and he breaks"
]
