    "demon — horned, tailed, fire-touched, summoned from a lower realm, darkly seductive and fiercely loyal",
    "dark fae — tall, ethereal, antlered, otherworldly beautiful but alien, bound by rules and bargains",
    "minotaur — bull-headed, enormous, gentle despite his terrifying appearance, labyrinth guardian",
