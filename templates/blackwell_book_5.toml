    "strong emotional attachment to romantic partner — his intensity and vulnerability",
    "emotional immersion heightened by photographic sensory world",
    "emotional catharsis when the slowest burn finally ignites",
    "reader satisfaction with romantic resolution — the wait was worth it",
    "desire to immediately read Book 6",
    "desire to reread the darkroom scene and recommend to friends"
]

[setting]
city = "New York City"
neighborhood = "Midtown Manhattan"
building = "Blackwell Tower — a glass-and-steel skyscraper housing Blackwell Media Group"
key_locations = [
    "the photography studio (top floor of Blackwell Tower — natural light, white walls, industrial equipment)",
    "the darkroom (windowless, red safelight, chemical smell, developer trays — where everything changes)",
