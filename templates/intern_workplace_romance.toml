[metadata]
name = "Workplace Romance"
description = "A commercially optimized contemporary workplace romance novel featuring a young female intern and an attractive, emotionally guarded boss."
tone = "emotionally intense, romantic, immersive"
themes = ["vulnerability", "forbidden desire", "emotional growth", "power dynamics"]
n_chapters = 25
chapter_length = 2500
target_audience = "women 18-30, BookTok romance readers"
tropes = ["grumpy-sunshine", "boss-intern", "forbidden romance", "slow burn"]

[meta]
purpose = "Instruction specification for a novel-writing AI to produce a commercially optimized contemporary workplace romance novel featuring a young female intern and an attractive, emotionally guarded boss. The narrative must maximize emotional intensity, romantic tension, and reader attachment while delivering a deeply satisfying Happily Ever After (HEA)."
planning_allowed = false
plot_generation_allowed = false
character_generation_allowed = false
title_generation_allowed = false
focus = "Define emotional, structural, sensual, and psychological characteristics required for maximum reader obsession, binge-read behavior, and conversion on Amazon KDP, Kindle Unlimited, and BookTok."

[target_audience]
primary_gender = "female"
age_range = "18-30"

psychographic_profile = [
    "seeks emotionally intense romantic experiences",
    "fantasizes about being uniquely chosen and desired",
    "values emotional validation and exclusivity",
    "responds strongly to power dynamics balanced with emotional safety",
    "prefers strong emotional payoff and satisfying romantic resolution",
    "engages deeply with character psychology and romantic tension",
    "actively consumes BookTok-recommended romance",
    "prefers immersive escapist emotional narratives"
]

reader_fantasy_drivers = [
    "being seen and recognized as uniquely special",
    "melting the emotional defenses of an emotionally unavailable partner",
    "being desired by a high-status, competent, and attractive partner",
    "emotional exclusivity",
    "emotional security earned through vulnerability",
    "romantic partner prioritizing protagonist above everything else"
]

[genre]
primary = "contemporary romance"

secondary = [
    "workplace romance",
    "boss-intern romance",
    "grumpy-sunshine romance",
    "forbidden romance",
    "emotional slow-burn romance"
]

genre_requirements = [
    "romance must be primary narrative driver",
    "external plot elements must exist only to intensify romantic tension",
    "emotional and romantic progression must drive pacing",
    "story must prioritize emotional immersion over external action"
]

[romantic_dynamic]
core_dynamic = "grumpy_sunshine"

dynamic_definition = [
    "male counterpart emotionally guarded, controlled, and restrained",
    "female protagonist emotionally open, warm, and authentic",
    "male counterpart gradually becomes emotionally vulnerable only with protagonist",
    "protagonist uniquely able to affect male counterpart emotionally",
    "male counterpart demonstrates emotional softening progressively"
]

power_dynamic_calibration = [
    "male counterpart initially holds structural authority",
    "male counterpart must never emotionally exploit protagonist",
    "male counterpart must demonstrate increasing emotional respect and equality",
    "relationship must evolve into emotional and relational equality"
]

[romantic_partner_design]
male_counterpart_required_traits = [
    "highly competent",
    "emotionally controlled",
    "psychologically complex",
    "protective without being possessive",
    "restrained emotional expression except with protagonist",
    "demonstrates emotional vulnerability only after prolonged tension"
]

attraction_model = [
    "initial emotional resistance",
    "involuntary attraction emergence",
    "attempted emotional suppression",
    "gradual emotional dependence",
    "emotional surrender"
]

exclusivity_requirement = "male counterpart must demonstrate emotional exclusivity toward protagonist"

[protagonist_design]
protagonist_gender = "female"

required_psychological_traits = [
    "emotionally intelligent",
    "optimistic but realistic",
    "capable of emotional vulnerability",
    "capable of emotional growth",
    "authentic and relatable"
]

reader_identification_requirement = "reader must easily psychologically project into protagonist"

[emotional_design]
primary_emotional_drivers = [
    "romantic tension",
    "longing",
    "anticipation",
    "emotional vulnerability",
    "emotional validation",
    "emotional exclusivity",
    "emotional safety after uncertainty"
]

emotional_progression_model = [
    "curiosity",
    "attraction",
    "tension",
    "emotional connection",
    "fear of loss",
    "emotional crisis",
    "emotional resolution",
    "emotional security"
]

attachment_mechanisms = [
    "private emotionally vulnerable conversations",
    "moments of emotional honesty",
    "protective behaviors",
    "demonstrations of emotional restraint",
    "increasing emotional openness"
]

[sensuality_calibration]
intensity = "high sensual tension without explicit anatomical description"

sensual_expression_methods = [
    "charged proximity",
    "lingering eye contact",
    "subtle physical contact",
    "heightened sensory awareness",
    "emotional responses to physical closeness",
    "psychological anticipation"
]

sensuality_function = "amplify emotional intimacy and romantic tension"

[pacing]
structure_priority = "emotional progression"

chapter_count = 25

chapter_length_words_min = 2000
chapter_length_words_max = 3500

tension_maintenance_protocol = [
    "romantic tension must remain unresolved for majority of narrative",
    "emotional payoff must be delayed strategically",
    "each chapter must increase romantic or emotional stakes",
    "avoid emotional neutrality"
]

reader_retention_mechanisms = [
    "unresolved romantic tension",
    "emotional uncertainty",
    "anticipation of emotional payoff",
    "deepening emotional intimacy"
]

[immersion_protocol]
narrative_perspective = "third person limited or first person"
perspective_priority = "maximize emotional intimacy"

description_priority_order = [
    "emotional internal experience",
    "sensory awareness",
    "interpretation of romantic partner behavior",
    "external environment"
]

immersion_methods = [
    "internal emotional monologue",
    "detailed emotional reactions",
    "sensory amplification during romantic moments",
    "continuous emotional continuity"
]

[conflict_design]
conflict_types = [
    "internal emotional resistance",
    "fear of emotional vulnerability",
    "fear of rejection",
    "professional boundary tension",
    "temporary emotional separation"
]

conflict_resolution_requirement = "conflicts must resolve in favor of emotional union"

[ending_requirements]
ending_type = "HEA"

hea_definition = [
    "clear emotional commitment",
    "long-term romantic stability",
    "emotional openness between partners",
    "elimination of emotional barriers",
    "reader certainty of permanent romantic union"
]

emotional_resolution_requirements = [
    "male counterpart must fully emotionally open",
    "male counterpart must actively choose protagonist",
    "protagonist must feel emotionally secure",
    "emotional payoff must exceed emotional tension experienced"
]

[reader_conversion_optimization]
booktok_alignment = [
    "emotionally intense dialogue moments",
    "memorable romantic tension scenes",
    "emotionally vulnerable confessions",
    "moments demonstrating emotional exclusivity",
    "high emotional payoff scenes"
]

kindle_unlimited_optimization = [
    "fast emotional engagement",
    "consistent romantic progression",
    "avoid prolonged exposition",
    "maximize immersive readability"
]

obsession_generation_factors = [
    "emotional unpredictability",
    "controlled emotional payoff timing",
    "deep emotional intimacy",
    "romantic exclusivity",
    "psychological realism"
]

[prohibited_elements]
explicit_anatomical_description = true
emotionally_unavailable_ending = true
ambiguous_romantic_resolution = true
emotionally_passive_male_counterpart = true
emotionally_passive_protagonist = true

[required_reader_effect]
psychological_outcomes = [
    "strong emotional attachment to romantic partner",
    "emotional immersion",
    "emotional catharsis",
    "reader satisfaction with romantic resolution",
    "desire to reread and recommend"
]

