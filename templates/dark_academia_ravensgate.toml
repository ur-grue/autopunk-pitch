[ending_requirements]
ending_type = "HEA per book, series HEA in Book 4"
hea_definition = [
    "the couple chooses each other with full knowledge of each other's secrets",
    "the mystery of the book is resolved (though the series mystery continues)",
    "the protagonist's place at Ravensgate is secured on her own terms",
    "emotional openness between partners -- no more secrets that matter",
    "the reader feels both romantic satisfaction and intellectual satisfaction"
]
emotional_resolution_requirements = [
    "the love interest must make a sacrifice that proves love outweighs the Society",
    "the protagonist must demonstrate that she is the love interest's intellectual equal",
    "the mystery resolution must be fair-play -- the reader could have guessed it from available clues",
    "epilogue must hint at the next book's couple and deepen the series mystery",
    "Book 4 epilogue reveals the Founder's truth and shows all couples at a Society gathering, the old secrets finally resolved"
]

