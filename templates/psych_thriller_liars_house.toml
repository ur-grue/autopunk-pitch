    "characters from previous books appear as neighbors — readers recognize them",
    "the neighborhood's accumulated secrets create a sense of a larger web",
    "each book features a different type of unreliable narrator — keeps the format fresh",
    "readers want to see what's behind every door on Wren Circle"
]
