[metadata]
name = "Cozy Fantasy"
description = "Series 20: The Moonpetal Tea Shop -- cozy fantasy set in the small town of Brindlemarsh, where a former adventurer opens a tea shop and discovers that the hardest quest is building a life you actually want to live. Gentle magic, wholesome romance, found family, and no world-ending stakes."
tone = "warm, gentle, whimsical, emotionally grounding"
themes = ["rest after striving", "finding home", "community as chosen family", "small acts of courage", "the magic in ordinary things"]
n_chapters = 18
chapter_length = 3055
target_audience = "cozy fantasy readers, Legends & Lattes fans, cozy mystery crossover, comfort readers, BookTok cozy romantasy"
author_style = "Clementine Wells"
tropes = ["tea shop in a fantasy town", "wholesome romance", "found family", "gentle magic", "slice-of-life", "no world-ending stakes", "grumpy-sunshine", "retired adventurer", "healing through community", "magical baking/brewing"]

[meta]
purpose = "Instruction specification for Series 20, 'The Moonpetal Tea Shop' by Clementine Wells. A commercially optimized cozy fantasy series set in Brindlemarsh, a small fantasy town. Six interconnected books, each following the tea shop owner and her growing circle of friends and neighbors through a new seasonal challenge. Low spice (fade-to-black). HEA per book. Comfort-read optimization for KU binge behavior."
planning_allowed = false
plot_generation_allowed = false
character_generation_allowed = false
title_generation_allowed = false
focus = "Define gentle world-building, community dynamics, wholesome romantic architecture, and comfort-read pacing required for maximum reader attachment, cozy immersion, and series binge-read behavior in the emerging cozy fantasy niche."

[series]
name = "The Moonpetal Tea Shop"
author = "Clementine Wells"
book_number = 1
total_books = 6
book_title = ""
shop = "The Moonpetal -- a converted stone cottage on Brindlemarsh's main square, serving enchanted teas, herbal remedies, and baked goods. The tea has mild magical properties (calming, warming, dream-enhancing) depending on the blend."
shared_locations = ["The Moonpetal (the tea shop -- main counter, cozy tables, a garden terrace, an upstairs apartment)", "Brindlemarsh Square (cobblestoned, fountain in the center, market stalls on weekends)", "The Tanglewood (ancient forest bordering the town, source of magical herbs and occasional minor trouble)", "Hearthstone Bridge (arched stone bridge over the Brindlebrook, the town's unofficial thinking spot)", "Granny Fern's Cottage (the town herbalist, mentor figure, lives at the forest edge)"]
recurring_characters = ["Juniper Wren -- protagonist, former adventurer, tea shop owner, appears in all books", "Thistle -- a small woodland spirit who adopted the tea shop as his home, comic relief and emotional anchor", "Granny Fern -- elderly halfling herbalist, Juniper's mentor and the town's unofficial wisdom-keeper", "Rowan Duskfield -- the quiet carpenter who maintains the tea shop and whose slow-burn romance with Juniper spans the series"]
timeline = "Each book covers one season. The series spans 18 months (Book 1: autumn, Book 2: winter, Book 3: spring, Book 4: summer, Book 5: autumn again, Book 6: winter solstice). The passage of seasons drives the shop's menu, the town's festivals, and the emotional arc."
series_arc = "Juniper Wren left adventuring after a quest that cost her a friend. She came to Brindlemarsh to disappear. Instead, she built a tea shop, a community, and a life. The series traces her journey from someone running away from pain to someone who has built something worth staying for. The overarching thread is gentle: each book introduces a small problem that threatens the town's peace, and each resolution strengthens the community. No villains. No apocalypse. Just life, with magic."
book_hooks = [
    "Book 1 (Autumn): Juniper opens the Moonpetal in a skeptical town where the last tea shop failed. She must win over the locals before winter, when no one will try a new shop. The carpenter fixing her leaking roof is infuriatingly helpful.",
    "Book 2 (Winter): A magical cold snap threatens Brindlemarsh's winter festival and the Tanglewood's rare frost-blooming herbs. Juniper and Rowan must venture into the forest together -- and confront what is growing between them.",
    "Book 3 (Spring): A rival tea merchant arrives in town with flashier magic and lower prices. Juniper must decide what makes the Moonpetal special -- and accept help from the community she has been holding at arm's length.",
    "Book 4 (Summer): Juniper's old adventuring companion arrives in Brindlemarsh, bringing news of the friend she lost. The past she ran from catches up, and the community she built holds her steady.",
    "Book 5 (Autumn): The Tanglewood is changing -- the magical herbs are growing differently, and Granny Fern believes it is a natural cycle that only happens once a century. The town must adapt, and Juniper must step into a role she never wanted: community leader.",
    "Book 6 (Winter Solstice): The Moonpetal's first anniversary. A gentle crisis brings the entire town together for one perfect winter night. Juniper and Rowan's romance reaches its fullest expression. The found family is complete."
]

