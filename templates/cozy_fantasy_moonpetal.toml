    "carries quiet grief that surfaces in still moments",
    "grows from isolation to connection across the series",
    "possesses a dry, gentle humor",
    "loves deeply but slowly -- trust is earned, not given"
]
reader_identification_requirement = "reader must feel Juniper's journey from exhaustion to peace -- the cozy fantasy is the reader's rest too"

