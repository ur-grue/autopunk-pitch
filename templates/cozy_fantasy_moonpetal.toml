primary_gender = "female (80%), male (20%)"
age_range = "25-55"
psychographic_profile = [
    "seeks comfort reads as emotional regulation -- reads cozy fantasy to decompress",
    "values gentleness and kindness in fiction as a counterpoint to stressful reality",
    "responds to detailed descriptions of food, drink, and domestic spaces",
    "enjoys low-stakes problems solved through community effort and personal growth",
    "crossover audience with cozy mystery, cottagecore aesthetic, and Stardew Valley fans",
    "prefers wholesome romance -- the anticipation matters more than explicit content",
    "active on BookTok cozy fantasy hashtags, Bookstagram, and cozy reading communities",
    "will reread comfort books seasonally and collect the series"
]
reader_comfort_drivers = [
    "the fantasy of leaving a stressful life to open a small shop in a magical town",
    "being surrounded by kind, quirky people who become family",
    "the sensory pleasure of tea, baked goods, and a warm fire",
    "a romance that builds slowly and safely, where both people are gentle with each other",
    "seasonal rhythms that make the world feel alive and cyclical",
    "the assurance that nothing terrible will happen -- comfort without anxiety"
]

[genre]
primary = "cozy fantasy"
secondary = ["cozy romantasy", "slice-of-life fantasy", "comfort fantasy", "cottagecore fiction", "wholesome fantasy romance"]
genre_requirements = [
    "stakes must be personal and local -- no world-ending threats",
    "violence is absent or minimal and off-page",
    "the tone must remain warm and gentle throughout -- even conflicts are handled with kindness",
    "food, drink, and domestic spaces must be described with sensory richness",
    "magic must feel natural, integrated, and non-threatening",
    "the community must feel like a place the reader wants to live in",
    "romance must be wholesome and slow-burn -- fade-to-black for intimate scenes"
]

[world_building]
magic_system = [
    "magic is ambient and botanical -- it grows in plants, flows in water, and responds to intention",
    "enchanted tea is the most common magical craft -- different herbs produce different mild effects (calm, warmth, clarity, pleasant dreams, mild pain relief)",
    "magic cannot heal serious injury or illness -- it soothes, comforts, and enhances, but does not cure",
    "the Tanglewood forest is the primary source of magical herbs -- it has moods and seasons of its own",
    "some individuals have a stronger affinity for botanical magic (Juniper, Granny Fern)",
    "magic is not dramatic or flashy -- a cup of moonpetal tea glows faintly silver, a calming blend smells like rain",
    "no combat magic exists in this world -- magic is for nurturing, not fighting"
]
fantasy_town = [
    "Brindlemarsh -- a town of approximately 800 residents (humans, halflings, a few elves, and one retired dwarf smith)",
    "built along the Brindlebrook, a clear stream that flows from the Tanglewood",
    "stone and timber buildings with moss-covered roofs, window boxes full of herbs",
    "the town square hosts a weekend market, seasonal festivals, and the annual Solstice Faire",
    "no mayor -- governance by Town Council of elected elders, meetings held at the pub",
    "the economy runs on farming, forestry, herbalism, and craft trades",
    "the nearest city is three days by cart -- Brindlemarsh is comfortably isolated"
]
non_human_races = [
    "halflings -- shorter, rounder, excellent cooks and gardeners, make up about 20% of Brindlemarsh's population",
    "elves -- taller, longer-lived, three elven families live in Brindlemarsh, tend to be the town's historians and teachers",
    "dwarves -- one retired dwarf smith (Brom Ironkettle) runs the town's forge and is the unofficial fix-it expert",
    "woodland spirits -- small, semi-corporeal beings that live in the Tanglewood and occasionally wander into town (Thistle is one)",
    "race is unremarkable in Brindlemarsh -- no tension, no prejudice, just neighbors"
]

[community_design]
shop_regulars = [
    "Mabel Thornberry -- human, elderly, the town gossip, sits at the same table every morning, orders chamomile with extra honey, knows everyone's business and shares it freely",
    "Pim and Pippa Meadowbrook -- halfling twins, run the bakery next door, supply the Moonpetal with pastries, relentlessly cheerful",
    "Sage Larkhollow -- elf, the schoolteacher, comes in after classes, orders anything with mint, reads at the window table",
    "Brom Ironkettle -- dwarf, retired smith, enormous hands, surprisingly delicate with teacups, tells stories of his youth to anyone who sits with him",
    "Thistle -- woodland spirit, the size of a squirrel, lives in the tea shop's herb garden, steals sugar cubes, communicates through gestures and glowing"
]
found_family_arc = [
    "Book 1: Juniper is a stranger. The regulars are polite but distant. She earns their trust through consistency and good tea.",
    "Book 2: The regulars become allies during the winter crisis. Juniper accepts help for the first time.",
    "Book 3: The community rallies around the Moonpetal when it is threatened. Juniper realizes she has built something that matters to others.",
    "Book 4: The community holds Juniper up when her past arrives. She lets them see her pain.",
    "Book 5: Juniper steps into leadership naturally, and the community follows because they trust her.",
    "Book 6: The found family is complete. The final scene is everyone together in the Moonpetal on the longest night of the year."
]

[romantic_dynamic]
core_dynamic = "gentle_slow_burn"
dynamic_definition = [
    "Rowan is quiet, steady, and present -- he shows love through acts of service (fixing, building, carrying)",
    "Juniper is warm but guarded -- she cares for everyone but struggles to let anyone care for her",
    "the romance builds through proximity, small gestures, and shared silences",
    "there is no grand obstacle -- just two people learning to trust at their own pace",
    "the community notices the romance before either of them admits it"
]
romantic_progression = [
    "Book 1: Rowan fixes the shop. They are cordial. He stays for tea. She pretends not to notice his kindness.",
    "Book 2: The winter quest forces them together. A near-miss moment (almost-kiss, interrupted). She realizes she cares.",
    "Book 3: Jealousy (mild, wholesome) when the rival tea merchant flirts with Juniper. Rowan's quiet steadiness becomes her anchor.",
    "Book 4: Juniper's vulnerability about her past. Rowan holds her (literally). First kiss.",
    "Book 5: They are together but navigating what that means. Domestic intimacy. He builds her a reading nook.",
    "Book 6: Full HEA. He proposes with a carved wooden teacup. The whole town celebrates."
]
power_dynamic_calibration = [
    "perfectly equal -- neither leads, neither follows",
    "Rowan's physical strength is never used to dominate -- he builds, he carries, he holds",
    "Juniper's adventuring past means she is the more physically capable of the two -- she protects him once and it is wonderful",
    "emotional vulnerability is mutual and gradual",
    "the romance must feel earned through six books of patient development"
]

[protagonist_design]
protagonist_name = "Juniper Wren"
protagonist_background = "Former adventurer (ranger/herbalist). Left her adventuring party after a quest that cost her closest friend's life. Came to Brindlemarsh to start over. Channels her skills into tea-making and herbalism."
required_psychological_traits = [
    "warm and generous with others but struggles to accept generosity directed at herself",
