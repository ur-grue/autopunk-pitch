    "physically imposing but emotionally restrained",
    "competent in their domain (engineering, security, medicine, command)",
    "protective instinct expressed through action, not words",
    "struggles with the intensity of the fated bond -- fights it before surrendering",
    "demonstrates vulnerability only with their omega",
    "capable of tenderness that contrasts sharply with their public persona"
]
attraction_model = [
