[metadata]
name = "Omegaverse Sci-Fi Romance"
description = "Series 16: Omega Station Zero -- an omegaverse romance series set on a deep-space research station at the edge of known space, where alpha/omega dynamics collide with alien biology, political intrigue, and the raw physics of survival."
tone = "intense, atmospheric, sensual, claustrophobic"
themes = ["biological destiny vs. free will", "found family in isolation", "trust under pressure", "redefining power dynamics", "intimacy as survival"]
n_chapters = 20
chapter_length = 3750
target_audience = "omegaverse romance readers, sci-fi romance crossover, monster romance adjacent"
author_style = "Rowan Ashfire"
tropes = ["alpha/omega dynamics in space", "heat cycles", "fated mates", "alien omegaverse", "nesting on a space station", "forced proximity", "protective alpha", "omega in heat", "pack bonding", "touch starvation"]

[meta]
purpose = "Instruction specification for Series 16, 'Omega Station Zero' by Rowan Ashfire. A commercially optimized omegaverse sci-fi romance series combining alpha/omega dynamics with deep-space isolation. Six interconnected books, each featuring a different couple aboard Station Zero. High spice. HEA guaranteed per book, series-arc HEA in Book 6."
planning_allowed = false
plot_generation_allowed = false
character_generation_allowed = false
title_generation_allowed = false
focus = "Define omegaverse mechanics, emotional architecture, sensual calibration, and sci-fi world-building required for maximum reader obsession, binge-read behavior, and KU page-read optimization in the omegaverse + sci-fi crossover niche."

[series]
name = "Omega Station Zero"
author = "Rowan Ashfire"
book_number = 1
total_books = 6
book_title = ""
station = "Station Zero -- a massive ring-shaped deep-space research station orbiting a dying star at the boundary of explored space, population ~2,000, a mix of human and alien designations"
shared_locations = ["The Spine (central corridor connecting all habitat rings)", "Nesting Commons (communal omega safe-space with adjustable gravity and temperature)", "The Bridge (command center with panoramic star-field views)", "Hydroponics Bay 7 (lush greenhouse sector, the station's lungs)", "Heat Quarters (reinforced private suites for heat cycles)", "The Marrow (black-market level in the station's maintenance tunnels)"]
recurring_characters = ["Station Commander Voss -- beta, pragmatic, holds the station together", "Dr. Sable Orin -- omega xenobiologist, appears in all books as the resident expert on alien designation biology", "Kael -- alien alpha from the Dravari species, security chief, love interest in Book 3"]
timeline = "Each book covers 2-4 months station time. Series spans approximately 18 months total."
series_arc = "A signal from beyond the dying star is altering designation biology on the station -- omegas are presenting new abilities, alphas are losing control of their ruts, and someone on Station Zero knows why. The series-level mystery resolves in Book 6."
book_hooks = [
    "Book 1: A newly arrived omega engineer discovers her heat cycle has changed since boarding the station -- and the alpha she's been assigned to work with can smell it",
    "Book 2: A mated alpha-omega pair whose bond is failing must re-bond or lose each other permanently when the station's designation suppression tech goes offline",
    "Book 3: A human omega and an alien (Dravari) alpha discover their species' designation systems are compatible in ways no one predicted",
    "Book 4: An alpha who has never gone into rut suddenly presents during a station lockdown -- trapped in a sealed sector with the omega he's been secretly protecting",
    "Book 5: Twin omegas, one bonded and one unbonded, must navigate a pack-bonding arrangement with a Dravari alpha triad to secure an alliance that could save the station",
    "Book 6: The station commander's secret omega status is exposed during the final crisis, and the alpha who discovers the truth is the one person she cannot afford to trust"
]

[target_audience]
primary_gender = "female"
age_range = "22-40"
psychographic_profile = [
    "reads omegaverse voraciously and expects tropes executed with precision",
    "seeks intense biological-drive romance with emotional depth beyond the heat",
    "values world-building that makes the omegaverse mechanics feel inevitable rather than arbitrary",
    "responds to power exchange dynamics balanced with genuine emotional care",
    "craves found-family pack dynamics and nesting comfort scenes",
    "enjoys sci-fi settings that heighten the isolation and forced-proximity elements",
    "prefers high spice with emotional justification -- heat scenes must advance the bond",
    "active in omegaverse Facebook groups, Discord servers, and AO3 crossover communities"
]
reader_fantasy_drivers = [
    "being biologically claimed by someone who cannot resist you",
    "the safety and comfort of a perfect nest built by a devoted alpha",
    "surrendering control during heat and being completely cared for",
    "being the one omega who breaks through an alpha's control",
    "pack belonging -- being surrounded by people who would kill to protect you",
    "the primal satisfaction of a fated bond clicking into place"
]

[genre]
primary = "omegaverse romance"
secondary = ["sci-fi romance", "alien romance", "fated mates", "forced proximity", "space station romance"]
genre_requirements = [
    "omegaverse dynamics must be the primary world-building engine",
    "romance must drive the plot -- sci-fi elements serve the romantic tension",
    "each book must be a complete romance with HEA while advancing the series mystery",
    "designation biology must feel biological and inevitable, not magical",
    "alien species must have compatible but distinct designation systems"
]

[omegaverse_mechanics]
designation_system = "Alpha / Beta / Omega -- biological, not chosen. Manifests at puberty. Approximately 20% alpha, 60% beta, 20% omega in human populations. Alien species have analogous systems with different ratios."
heat_cycles = [
    "Omegas experience heat every 3-4 months, lasting 3-5 days",
    "Heat involves intense physical need, heightened scent production, nesting instinct, and reduced inhibition",
    "Suppressants exist but are imperfect -- Station Zero's proximity to the dying star degrades their effectiveness",
    "An omega in heat near a compatible alpha triggers sympathetic rut",
    "Heat scenes must be visceral, sensory-rich, and emotionally raw -- not clinical",
    "Post-heat vulnerability is a key emotional bonding moment"
]
bonding = [
    "Bonding occurs through a bite to the scent gland during mutual heat/rut",
    "A bond creates a permanent psychic-emotional link -- partners sense each other's emotions and physical state",
    "Bonds can weaken if neglected (Book 2 premise)",
    "Rejected bonds cause physical pain -- bond-sickness",
    "Fated mates experience an overwhelming scent-compatibility that overrides rational thought"
]
nesting = [
    "Omegas build nests from soft materials, clothing with pack-scent, and comfort items",
    "Nesting behavior intensifies before heat and during emotional distress",
    "An alpha being invited into an omega's nest is an act of profound trust",
    "On Station Zero, nesting spaces are scarce and politically contested -- a subplot driver",
    "Nesting scenes should evoke warmth, safety, and intimacy -- a counterpoint to the cold void of space"
]
pack_structure = [
    "Packs are social units of 3-7 individuals, typically centered around an alpha-omega bonded pair",
    "Pack bonds are less intense than mate bonds but provide emotional stability and mutual protection",
    "Station Zero's isolation accelerates pack-formation among unaffiliated individuals",
    "Pack hierarchy is negotiated, not imposed -- dominance displays are social, not violent",
    "The series builds toward a station-wide pack alliance in Book 6"
]
scent_dynamics = [
    "Scent is the primary designation communication channel",
    "Alphas produce territorial and arousal scents; omegas produce bonding and distress scents",
    "Scent-matching indicates biological compatibility -- the stronger the match, the more intense the attraction",
    "Scent-blockers are common but imperfect technology on the station",
    "Alien species' scents interact with human designation biology in unexpected ways (series mystery)"
]

[romantic_dynamic]
core_dynamic = "alpha_omega_fated"
dynamic_definition = [
    "alpha driven by biological imperative to protect, provide, and claim",
    "omega possesses biological power to accept, reject, and redirect alpha behavior through scent and bond",
    "the power balance is reciprocal -- the alpha is as vulnerable to the omega's pull as the reverse",
    "emotional surrender is mutual, not one-directional",
    "the bond amplifies existing emotional connection rather than replacing it"
]
power_dynamic_calibration = [
    "alpha must never coerce omega during or outside of heat -- consent is sacred even when biology screams",
    "omega agency must be preserved throughout -- omegas choose, alphas respond",
    "heat does not erase consent -- both partners must actively choose each other",
    "alpha protectiveness must not become possessive control",
    "the relationship must evolve from biological pull to genuine emotional partnership"
]

